<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>neiro — Logo Design Exploration</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            background: #FAFAFA;
            color: #1A1A1A;
            overflow-x: hidden;
        }
        .font-mono { font-family: 'JetBrains Mono', 'Courier New', monospace; }
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 9999;
        }
        html { scroll-behavior: smooth; }
        .logo-card {
            transition: all 0.7s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .logo-card:hover { transform: translateY(-4px); }
        .logo-canvas {
            position: relative;
            transition: transform 0.7s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .logo-aura {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle, rgba(120,120,120,0.2) 0%, transparent 70%);
            border-radius: 50%;
            transform: scale(0.5);
            opacity: 0;
            transition: all 1s cubic-bezier(0.16, 1, 0.3, 1);
            filter: blur(40px);
            pointer-events: none;
        }
        .logo-card:hover .logo-aura {
            transform: scale(1);
            opacity: 1;
        }
        .divider-line {
            width: 0;
            height: 1px;
            background: #1A1A1A;
            opacity: 0.2;
            transition: width 0.7s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .logo-card:hover .divider-line { width: 100%; }
        .tracking-ultra-wide { letter-spacing: 0.2em; }
        .text-balance { text-wrap: balance; }
        .logo-dark-bg { color: #1A1A1A; }
        .logo-light-bg { color: #E8E8E8; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;

        const Logo01 = () => (
            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" className="w-full h-full">
                <defs>
                    <clipPath id="fret-clip"><rect x="20" y="18" width="60" height="64" rx="4"/></clipPath>
                </defs>
                <g clipPath="url(#fret-clip)">
                    <g stroke="currentColor" strokeWidth="0.8" opacity="0.35">
                        <line x1="20" y1="30" x2="80" y2="30"/>
                        <line x1="20" y1="41" x2="80" y2="41"/>
                        <line x1="20" y1="52" x2="80" y2="52"/>
                        <line x1="20" y1="63" x2="80" y2="63"/>
                        <line x1="20" y1="74" x2="80" y2="74"/>
                    </g>
                    <g stroke="currentColor" strokeWidth="1.5" opacity="0.15">
                        <line x1="28" y1="18" x2="28" y2="82"/>
                        <line x1="38" y1="18" x2="38" y2="82"/>
                        <line x1="50" y1="18" x2="50" y2="82"/>
                        <line x1="64" y1="18" x2="64" y2="82"/>
                    </g>
                    <circle cx="50" cy="52" r="5" fill="currentColor" opacity="0.9"/>
                    <circle cx="64" cy="41" r="3" fill="currentColor" opacity="0.25"/>
                    <circle cx="38" cy="63" r="3" fill="currentColor" opacity="0.15"/>
                </g>
                <circle cx="50" cy="52" r="2.5" fill="currentColor"/>
            </svg>
        );

        const Logo02 = () => (
            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" className="w-full h-full">
                <defs>
                    <clipPath id="wave-clip"><circle cx="50" cy="50" r="36"/></clipPath>
                </defs>
                <g clipPath="url(#wave-clip)">
                    <g fill="none" stroke="currentColor" strokeLinecap="round">
                        <path d="M 14 50 Q 26 32, 38 50 T 62 50 T 86 50" strokeWidth="3" opacity="0.9"/>
                        <path d="M 14 50 Q 26 38, 38 50 T 62 50 T 86 50" strokeWidth="1.8" opacity="0.2" transform="translate(0, -8)"/>
                        <path d="M 14 50 Q 26 38, 38 50 T 62 50 T 86 50" strokeWidth="1.8" opacity="0.2" transform="translate(0, 8)"/>
                    </g>
                    <circle cx="38" cy="50" r="2.5" fill="currentColor" opacity="0.4"/>
                    <circle cx="62" cy="50" r="2.5" fill="currentColor" opacity="0.4"/>
                </g>
                <circle cx="50" cy="50" r="36" fill="none" stroke="currentColor" strokeWidth="0.6" opacity="0.15"/>
                <circle cx="50" cy="50" r="3.5" fill="currentColor"/>
            </svg>
        );

        const Logo03 = () => (
            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" className="w-full h-full">
                <g fill="currentColor">
                    <g opacity="0.12">
                        <circle cx="30" cy="25" r="2.5"/><circle cx="40" cy="25" r="2.5"/>
                        <circle cx="50" cy="25" r="2.5"/><circle cx="60" cy="25" r="2.5"/>
                        <circle cx="70" cy="25" r="2.5"/>
                        <circle cx="30" cy="37" r="2.5"/><circle cx="40" cy="37" r="2.5"/>
                        <circle cx="50" cy="37" r="2.5"/><circle cx="60" cy="37" r="2.5"/>
                        <circle cx="70" cy="37" r="2.5"/>
                        <circle cx="30" cy="49" r="2.5"/><circle cx="40" cy="49" r="2.5"/>
                        <circle cx="60" cy="49" r="2.5"/><circle cx="70" cy="49" r="2.5"/>
                        <circle cx="30" cy="61" r="2.5"/><circle cx="40" cy="61" r="2.5"/>
                        <circle cx="50" cy="61" r="2.5"/><circle cx="60" cy="61" r="2.5"/>
                        <circle cx="70" cy="61" r="2.5"/>
                        <circle cx="30" cy="73" r="2.5"/><circle cx="40" cy="73" r="2.5"/>
                        <circle cx="50" cy="73" r="2.5"/><circle cx="60" cy="73" r="2.5"/>
                        <circle cx="70" cy="73" r="2.5"/>
                    </g>
                    <circle cx="50" cy="49" r="6" opacity="0.9"/>
                    <circle cx="50" cy="49" r="2.5" fill="white"/>
                </g>
            </svg>
        );

        const Logo04 = () => (
            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" className="w-full h-full">
                <g fill="none" stroke="currentColor" strokeWidth="3.5" strokeLinecap="round" strokeLinejoin="round">
                    <line x1="30" y1="28" x2="30" y2="72"/>
                    <line x1="30" y1="28" x2="70" y2="72"/>
                    <line x1="70" y1="28" x2="70" y2="72"/>
                </g>
                <g fill="currentColor">
                    <circle cx="30" cy="28" r="3"/>
                    <circle cx="70" cy="72" r="3"/>
                </g>
                <g fill="none" stroke="currentColor" opacity="0.15">
                    <line x1="24" y1="40" x2="76" y2="40" strokeWidth="0.8"/>
                    <line x1="24" y1="50" x2="76" y2="50" strokeWidth="0.8"/>
                    <line x1="24" y1="60" x2="76" y2="60" strokeWidth="0.8"/>
                </g>
            </svg>
        );

        const Logo05 = () => (
            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" className="w-full h-full">
                <g fill="none" stroke="currentColor">
                    <circle cx="50" cy="50" r="30" strokeWidth="2.5"/>
                    <circle cx="50" cy="50" r="18" strokeWidth="1.2" opacity="0.25"/>
                </g>
                <g fill="currentColor">
                    <circle cx="50" cy="20" r="3.5"/>
                    <circle cx="76" cy="35" r="2" opacity="0.2"/>
                    <circle cx="76" cy="65" r="3" opacity="0.45"/>
                    <circle cx="50" cy="80" r="2.5" opacity="0.3"/>
                    <circle cx="24" cy="65" r="2" opacity="0.15"/>
                    <circle cx="24" cy="35" r="3.5" opacity="0.7"/>
                </g>
                <g fill="currentColor">
                    <circle cx="50" cy="50" r="4"/>
                    <line x1="50" y1="50" x2="50" y2="20" stroke="currentColor" strokeWidth="1.5" opacity="0.5"/>
                    <line x1="50" y1="50" x2="24" y2="35" stroke="currentColor" strokeWidth="1.2" opacity="0.35"/>

                </g>
            </svg>
        );

        const Logo06 = () => (
            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" className="w-full h-full">
                <g fill="none" stroke="currentColor">
                    <g strokeWidth="0.8" opacity="0.18">
                        <line x1="20" y1="34" x2="80" y2="34"/>
                        <line x1="20" y1="42" x2="80" y2="42"/>
                        <line x1="20" y1="50" x2="80" y2="50"/>
                        <line x1="20" y1="58" x2="80" y2="58"/>
                        <line x1="20" y1="66" x2="80" y2="66"/>
                    </g>
                    <g strokeWidth="0.6" opacity="0.12">
                        <line x1="34" y1="22" x2="34" y2="78"/>
                        <line x1="44" y1="22" x2="44" y2="78"/>
                        <line x1="56" y1="22" x2="56" y2="78"/>
                        <line x1="66" y1="22" x2="66" y2="78"/>
                    </g>
                </g>
                <g fill="none" stroke="currentColor" strokeWidth="3.5" strokeLinecap="round" strokeLinejoin="round">
                    <path d="M 28 72 L 28 28 L 72 72 L 72 28"/>
                </g>
            </svg>
        );

        const Logo07 = () => (
            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" className="w-full h-full">
                <defs>
                    <clipPath id="res-clip"><circle cx="50" cy="50" r="32"/></clipPath>
                </defs>
                <g clipPath="url(#res-clip)" fill="none" stroke="currentColor" strokeLinecap="round">
                    <g strokeWidth="1.5">
                        <line x1="10" y1="35" x2="90" y2="35"/>
                        <line x1="10" y1="42" x2="90" y2="42"/>
                        <line x1="10" y1="49" x2="90" y2="49"/>
                        <line x1="10" y1="56" x2="90" y2="56"/>
                        <line x1="10" y1="63" x2="90" y2="63"/>
                    </g>
                    <line x1="34" y1="16" x2="34" y2="84" strokeWidth="1" opacity="0.25"/>
                    <line x1="50" y1="16" x2="50" y2="84" strokeWidth="1" opacity="0.25"/>
                    <line x1="66" y1="16" x2="66" y2="84" strokeWidth="1" opacity="0.25"/>
                </g>
                <circle cx="50" cy="49" r="4" fill="currentColor"/>
                <circle cx="50" cy="50" r="32" fill="none" stroke="currentColor" strokeWidth="2.5"/>
            </svg>
        );

        const LogoShowcase = () => {
            const logos = [
                {
                    Component: Logo01,
                    title: "Fretboard",
                    subtitle: "Variant 01 — Grid System",
                    philosophy: "将吉他指板的弦与品抽象为极简的线条网格。一个高亮的焦点位置暗示训练的核心——定位与记忆。半透明的辅助点代表你正在构建的音符知识网络。"
                },
                {
                    Component: Logo02,
                    title: "Resonance",
                    subtitle: "Variant 02 — Wave System",
                    philosophy: "振动的琴弦是音乐的起点。主波形代表弹奏出的声音，两侧衰减的回声象征记忆的回响。圆形边界统一了整个图形，圆心的实心点代表专注。"
                },
                {
                    Component: Logo03,
                    title: "Position",
                    subtitle: "Variant 03 — Dot Matrix",
                    philosophy: "5×5 点阵代表指板上的位置网格。多数位置以低透明度呈现，正中被标记的位置带有一个空洞——那是你需要记住的音。留白本身构成了设计的节奏。"
                },
                {
                    Component: Logo04,
                    title: "Forma",
                    subtitle: "Variant 04 — Letter N",
                    philosophy: "字母 N 的极简几何表达：两竖一斜，是 neiro 的首字母。横向穿过三条淡线暗示指板的品丝。端点的实心圆锚定结构，连接着字形与吉他指板的视觉语言。"
                },
                {
                    Component: Logo05,
                    title: "Fifths",
                    subtitle: "Variant 05 — Circle Network",
                    philosophy: "灵感来自五度圈——音乐理论的核心结构。不对称分布的节点从圆心辐射连接，表达音符之间的关系与层级。每个点到圆心的距离暗示记忆的掌握程度。"
                },
                {
                    Component: Logo06,
                    title: "Context",
                    subtitle: "Variant 06 — N + Fretboard",
                    philosophy: "Variant 04 的进阶版：将 N 字母叠加在完整的指板网格上。网格既是背景纹理也是产品隐喻——在指板的坐标系中，N（neiro）是导航者。粗线条的字形与精细的网格形成鲜明的层次对比。"
                },
                {
                    Component: Logo07,
                    title: "Focus",
                    subtitle: "Variant 07 — Circle Fret",
                    philosophy: "圆形裁剪内的指板网格，将矩形的吉他物理空间映射到圆形的视觉空间。圆心处的实心点代表训练中当前聚焦的音符位置。厚实的圆形边框赋予图形标志性的重量感。"
                }
            ];

            return (
                <div className="min-h-screen flex flex-col items-center py-20 px-6">
                    <div className="text-center mb-20 max-w-3xl">
                        <h1 className="text-6xl md:text-7xl font-extralight tracking-wider mb-6">
                            neiro
                        </h1>
                        <p className="font-mono text-xs opacity-40 uppercase tracking-ultra-wide mb-4">
                            Guitar Fretboard Note Trainer
                        </p>
                        <p className="text-sm opacity-50 font-light">
                            Memorize every note on the fretboard
                        </p>
                        <div className="w-12 h-[1px] bg-[#1A1A1A] mx-auto opacity-30 mt-8"></div>
                    </div>

                    <div className="max-w-7xl w-full grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-16 mb-32">
                        {logos.map((logo, index) => (
                            <div key={index} className="flex flex-col items-center logo-card cursor-pointer">
                                <div className="w-64 h-64 mb-10 flex items-center justify-center relative">
                                    <div className="logo-aura"></div>
                                    <div className="w-32 h-32 relative z-10 logo-canvas">
                                        <logo.Component />
                                    </div>
                                </div>
                                <div className="text-center w-full px-4">
                                    <h2 className="text-xl font-medium tracking-wider mb-2 uppercase">
                                        {logo.title}
                                    </h2>
                                    <h3 className="text-xs font-mono opacity-50 tracking-widest mb-6">
                                        {logo.subtitle}
                                    </h3>
                                    <p className="text-sm leading-relaxed opacity-70 text-left font-light text-balance">
                                        {logo.philosophy}
                                    </p>
                                </div>
                                <div className="divider-line mt-8 mx-auto"></div>
                            </div>
                        ))}
                    </div>

                    <div className="mt-16 max-w-4xl w-full">
                        <div className="text-center mb-12">
                            <h2 className="text-2xl font-light tracking-wider mb-2">Dark / Light Preview</h2>
                            <p className="text-xs font-mono opacity-40 tracking-widest uppercase">All variants on dark & light backgrounds</p>
                        </div>
                        <div className="grid grid-cols-7 gap-4">
                            {logos.map((logo, idx) => (
                                <div key={idx} className="flex flex-col gap-2">
                                    <div className="aspect-square bg-[#1A1A1A] rounded-lg flex items-center justify-center p-4">
                                        <div className="w-full h-full text-[#E8E8E8]"><logo.Component /></div>
                                    </div>
                                    <div className="aspect-square bg-white border border-gray-200 rounded-lg flex items-center justify-center p-4">
                                        <div className="w-full h-full text-[#1A1A1A]"><logo.Component /></div>
                                    </div>
                                </div>
                            ))}

                    <div className="mt-32 max-w-2xl text-center">
                        <p className="font-mono text-xs opacity-40 uppercase tracking-ultra-wide leading-loose">

                        </p>
                    </div>
                </div>
            );
        };

        ReactDOM.render(<LogoShowcase />, document.getElementById('root'));
    </script>
</body>
</html>
