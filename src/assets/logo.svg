<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <!-- 
    风格：日式极简 + 卡通可爱插画手绘
    元素：圆形网格 (粗画笔、弹性肉感)
    构图：正面平视、平面对称
    特点：无多余元素，仅靠纯粹的粗线条与圆润交角表现手绘温度
  -->

  <!-- 使用稍微柔和一点的软黑色，比纯黑更具有日系插画的温润感 -->
  <g stroke="#1F1F1F" fill="none" stroke-linecap="round" stroke-linejoin="round">
    
    <!-- ========================================== -->
    <!-- 1. 外轮廓圆 (超粗马克笔风格，18px) -->
    <!-- 分为四段，在 12、3、6、9 点钟方向有俏皮的交叉出头，表现起落笔的肉感 -->
    <!-- ========================================== -->
    <g stroke-width="18">
      <!-- 左上弧：下端向右下多出一点，右端向左下多出一点 -->
      <path d="M 55 265 C 50 140, 140 50, 265 55" />
      <!-- 右上弧 -->
      <path d="M 445 265 C 450 140, 360 50, 235 55" />
      <!-- 右下弧 -->
      <path d="M 445 235 C 450 360, 360 450, 235 445" />
      <!-- 左下弧 -->
      <path d="M 55 235 C 50 360, 140 450, 265 445" />
    </g>

    <!-- ========================================== -->
    <!-- 2. 内部网格 (略细一点的画笔，14px) -->
    <!-- 井字格布局，线条带有微微向内挤压的弧度，呈现出“软绵绵”的可爱张力 -->
    <!-- ========================================== -->
    <g stroke-width="14">
      <!-- 水平线 (向中心微微凹陷) -->
      <!-- 上横线：中点微微向下弯 -->
      <path d="M 70 160 Q 250 175 430 160" />
      <!-- 下横线：中点微微向上弯 -->
      <path d="M 70 340 Q 250 325 430 340" />

      <!-- 垂直线 (向中心微微凹陷) -->
      <!-- 左竖线：中点微微向右弯 -->
      <path d="M 160 70 Q 175 250 160 430" />
      <!-- 右竖线：中点微微向左弯 -->
      <path d="M 340 70 Q 325 250 340 430" />
    </g>

  </g>
</svg>